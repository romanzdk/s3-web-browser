{% extends "base.html" %}{% block content %}
<div class="page-title">Buckets</div>
<div class="page-subtitle">Select a bucket to browse its contents.</div>

{% set bucket_list = buckets | list %}
{% if bucket_list %}
<div class="bucket-grid">
  {% for bucket in bucket_list %}
  <a href="{{ url_for('view_bucket', bucket_name=bucket.name) }}" class="bucket-card">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
    </svg>
    <span title="{{ bucket.name }}">{{ bucket.name }}</span>
  </a>
  {% endfor %}
</div>
{% else %}
<div class="empty">
  <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4.03 3 9 3s9-1.34 9-3"/></svg>
  <p>No buckets found.</p>
</div>
{% endif %}
{% endblock %}
